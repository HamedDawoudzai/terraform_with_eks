name: Deploy to EKS

on:
  workflow_dispatch:
    inputs:
      action:
        description: 'Action to perform'
        required: true
        default: 'deploy'
        type: choice
        options: [deploy, destroy]

env:
  AWS_REGION: ${{ secrets.AWS_REGION }}
  CLUSTER_NAME: ${{ secrets.CLUSTER_NAME }}

permissions:
  id-token: write
  contents: read

jobs:
  deploy:
    name: Deploy EKS Infrastructure
    if: github.event.inputs.action == 'deploy'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: terraform
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Check app syntax
        working-directory: .
        run: node --check app/index.js

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Bootstrap remote state (idempotent)
        run: |
          aws s3 mb s3://${{ secrets.BACKEND_BUCKET }} --region ${{ env.AWS_REGION }} 2>/dev/null || true
          aws s3api put-bucket-versioning \
            --bucket ${{ secrets.BACKEND_BUCKET }} \
            --versioning-configuration Status=Enabled 2>/dev/null || true
          aws dynamodb create-table \
            --table-name ${{ secrets.DYNAMODB_TABLE }} \
            --attribute-definitions AttributeName=LockID,AttributeType=S \
            --key-schema AttributeName=LockID,KeyType=HASH \
            --billing-mode PAY_PER_REQUEST \
            --region ${{ env.AWS_REGION }} 2>/dev/null || true

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Terraform Init
        run: |
          terraform init \
            -backend-config="bucket=${{ secrets.BACKEND_BUCKET }}" \
            -backend-config="key=${{ secrets.BACKEND_KEY }}" \
            -backend-config="region=${{ secrets.AWS_REGION }}" \
            -backend-config="dynamodb_table=${{ secrets.DYNAMODB_TABLE }}" \
            -backend-config="encrypt=true"

      - name: Terraform Format Check
        run: terraform fmt -check -recursive

      - name: Terraform Validate
        run: terraform validate

      - name: Import existing resources into state (if left behind by a partial destroy)
        run: |
          terraform import aws_ecr_repository.hello_api hello-api 2>/dev/null || true

      - name: Apply core infrastructure
        run: |
          terraform apply -auto-approve \
            -target=module.iam \
            -target=module.vpc \
            -target=module.eks

      - name: Apply app deployment
        run: terraform apply -auto-approve

      - name: Update kubeconfig
        working-directory: .
        run: aws eks update-kubeconfig --region ${{ env.AWS_REGION }} --name ${{ env.CLUSTER_NAME }}

      - name: Install Metrics Server addon
        run: |
          aws eks create-addon \
            --cluster-name ${{ env.CLUSTER_NAME }} \
            --addon-name metrics-server \
            --region ${{ env.AWS_REGION }} || true

  destroy:
    name: Destroy Infrastructure
    if: github.event.inputs.action == 'destroy'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: terraform
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Terraform Init
        run: |
          terraform init \
            -backend-config="bucket=${{ secrets.BACKEND_BUCKET }}" \
            -backend-config="key=${{ secrets.BACKEND_KEY }}" \
            -backend-config="region=${{ secrets.AWS_REGION }}" \
            -backend-config="dynamodb_table=${{ secrets.DYNAMODB_TABLE }}" \
            -backend-config="encrypt=true"

      - name: Configure kubectl
        working-directory: .
        run: aws eks update-kubeconfig --region ${{ env.AWS_REGION }} --name ${{ env.CLUSTER_NAME }} || true

      - name: Delete Kubernetes resources and wait for ELB cleanup
        working-directory: .
        run: |
          # Capture the ELB hostname before deleting the service so we can
          # wait for AWS to fully remove it before destroying the VPC.
          ELB_HOSTNAME=$(kubectl get svc hello-api \
            -o jsonpath='{.status.loadBalancer.ingress[0].hostname}' 2>/dev/null || echo "")

          kubectl delete svc hello-api --wait=true --timeout=180s 2>/dev/null || true
          kubectl delete deployment hello-api --wait=true --timeout=60s 2>/dev/null || true

          # Poll until the Classic ELB is gone from AWS. Terraform destroy will
          # fail with DependencyViolation if it tries to delete the VPC while
          # the ELB's network interfaces are still attached to the subnets.
          if [ -n "$ELB_HOSTNAME" ]; then
            echo "Waiting for ELB ${ELB_HOSTNAME} to be removed from AWS..."
            for i in $(seq 1 36); do
              COUNT=$(aws elb describe-load-balancers \
                --region ${{ env.AWS_REGION }} \
                --query "LoadBalancerDescriptions[?DNSName=='${ELB_HOSTNAME}'] | length(@)" \
                --output text 2>/dev/null || echo "0")
              if [ "$COUNT" = "0" ]; then
                echo "ELB deleted after $((i * 10))s."
                break
              fi
              echo "  attempt $i/36 — ELB still deleting, waiting 10s..."
              sleep 10
            done
          fi

      - name: Remove Kubernetes resources from state
        run: |
          terraform state rm kubernetes_service.hello_api 2>/dev/null || true
          terraform state rm kubernetes_deployment.hello_api 2>/dev/null || true
          terraform state rm null_resource.docker_build_push 2>/dev/null || true

      - name: Terraform Destroy
        run: terraform destroy -auto-approve
