name: Deploy to EKS

on:
  workflow_dispatch:
    inputs:
      action:
        description: 'Action to perform'
        required: true
        default: 'deploy'
        type: choice
        options: [deploy, destroy]

env:
  AWS_REGION: ${{ secrets.AWS_REGION }}
  CLUSTER_NAME: ${{ secrets.CLUSTER_NAME }}

permissions:
  id-token: write
  contents: read

jobs:
  validate:
    name: Validate
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Check app syntax
        run: node --check app/index.js

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Terraform Init (no backend)
        working-directory: terraform
        run: terraform init -backend=false

      - name: Terraform Format Check
        working-directory: terraform
        run: terraform fmt -check -recursive

      - name: Terraform Validate
        working-directory: terraform
        run: terraform validate

  deploy-infra:
    name: Provision Infrastructure
    needs: validate
    if: github.event.inputs.action == 'deploy'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: terraform
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Bootstrap state backend
        working-directory: .
        run: |
          aws s3api create-bucket \
            --bucket ${{ secrets.BACKEND_BUCKET }} \
            --region ${{ secrets.AWS_REGION }} 2>/dev/null || true
          aws s3api put-bucket-versioning \
            --bucket ${{ secrets.BACKEND_BUCKET }} \
            --versioning-configuration Status=Enabled
          aws dynamodb create-table \
            --table-name ${{ secrets.DYNAMODB_TABLE }} \
            --attribute-definitions AttributeName=LockID,AttributeType=S \
            --key-schema AttributeName=LockID,KeyType=HASH \
            --billing-mode PAY_PER_REQUEST \
            --region ${{ secrets.AWS_REGION }} 2>/dev/null || true

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Terraform Init
        run: |
          terraform init \
            -backend-config="bucket=${{ secrets.BACKEND_BUCKET }}" \
            -backend-config="key=${{ secrets.BACKEND_KEY }}" \
            -backend-config="region=${{ secrets.AWS_REGION }}" \
            -backend-config="dynamodb_table=${{ secrets.DYNAMODB_TABLE }}" \
            -backend-config="encrypt=true"

      - name: Terraform Apply Phase 1 (EKS cluster)
        run: terraform apply -target=module.eks -auto-approve

      - name: Terraform Apply Phase 2 (app deployment)
        run: terraform apply -auto-approve

      - name: Configure kubectl
        working-directory: .
        run: aws eks update-kubeconfig --region ${{ env.AWS_REGION }} --name ${{ env.CLUSTER_NAME }}

      - name: Install Metrics Server addon
        run: |
          aws eks create-addon \
            --cluster-name ${{ env.CLUSTER_NAME }} \
            --addon-name metrics-server \
            --region ${{ env.AWS_REGION }} || true

  destroy:
    name: Destroy Infrastructure
    needs: validate
    if: github.event.inputs.action == 'destroy'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: terraform
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Configure kubectl
        working-directory: .
        run: |
          aws eks update-kubeconfig --region ${{ env.AWS_REGION }} --name ${{ env.CLUSTER_NAME }} || true

      - name: Delete K8s resources via kubectl
        working-directory: .
        run: |
          kubectl delete svc hello-api --wait=true --timeout=180s 2>/dev/null || true
          kubectl delete deployment hello-api --wait=true --timeout=60s 2>/dev/null || true
          echo "Waiting for LoadBalancer cleanup..."
          sleep 60

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Terraform Init
        run: |
          terraform init \
            -backend-config="bucket=${{ secrets.BACKEND_BUCKET }}" \
            -backend-config="key=${{ secrets.BACKEND_KEY }}" \
            -backend-config="region=${{ secrets.AWS_REGION }}" \
            -backend-config="dynamodb_table=${{ secrets.DYNAMODB_TABLE }}" \
            -backend-config="encrypt=true"

      - name: Remove K8s resources from state
        run: |
          terraform state rm kubernetes_service.hello_api 2>/dev/null || true
          terraform state rm kubernetes_deployment.hello_api 2>/dev/null || true
          terraform state rm null_resource.docker_build_push 2>/dev/null || true

      - name: Terraform Destroy
        run: terraform destroy -auto-approve
